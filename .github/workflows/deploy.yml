name: CI/CD — Ad Astra

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # 1. Run backend tests
  # ──────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ──────────────────────────────────────────────
  # 2. Verify frontend builds successfully
  # ──────────────────────────────────────────────
  build-frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://ad-astra.openschools.space/api

  # ──────────────────────────────────────────────
  # 3. Deploy to EC2 (main branch only)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            APP_DIR="/var/www/ad-astra"
            REPO_URL="https://github.com/Ad-Astra-BITS/Multicloud-Userfriendly-wrapper.git"

            # ── Clone on first deploy, pull on subsequent ones ──
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "→ First deploy: cloning repository..."
              sudo mkdir -p "$APP_DIR"
              sudo chown ubuntu:ubuntu "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            else
              echo "→ Pulling latest changes..."
              cd "$APP_DIR"
              git pull origin main
            fi

            # ── Write backend .env from GitHub secrets ──
            printf 'PORT=4000\nNODE_ENV=production\nDATABASE_URL=%s\n' '${{ secrets.DATABASE_URL }}' > "$APP_DIR/backend/.env"

            # ── Install Nginx config (only if not already done) ──
            if [ ! -f /etc/nginx/sites-enabled/ad-astra ]; then
              echo "→ Configuring Nginx..."
              sudo cp "$APP_DIR/deploy/nginx.conf" /etc/nginx/sites-available/ad-astra
              sudo ln -sf /etc/nginx/sites-available/ad-astra /etc/nginx/sites-enabled/ad-astra
              sudo nginx -t && sudo systemctl reload nginx
            fi

            # ── Build backend ──
            echo "→ Building backend..."
            cd "$APP_DIR/backend"
            npm ci
            npm run build
            npx prisma generate
            npx prisma migrate deploy

            # ── Build frontend ──
            echo "→ Building frontend..."
            cd "$APP_DIR"
            npm ci
            NEXT_PUBLIC_API_URL=https://ad-astra.openschools.space/api npm run build

            # ── Start or reload PM2 ──
            echo "→ Restarting services..."
            cd "$APP_DIR"
            pm2 reload ecosystem.config.js --update-env 2>/dev/null || pm2 start ecosystem.config.js
            pm2 save

            echo "✓ Deployed successfully"
